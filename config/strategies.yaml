# Per-strategy configuration. Any strategy not listed runs with `defaults`.
# mode: off | backtest | paper | live   (live requires a passing gate + explicit promotion)
# params: overrides merged over the strategy file's meta.params
# capital: rupees allocated to the strategy (risk sizing base)
#
# EVERYTHING SHIPS IN PAPER MODE. Promote via POST /strategies/{id}/promote or
# the dashboard once gate_status.eligible is true.

defaults:
  mode: paper
  capital: 100000

