# Paper-to-live promotion gate (compendium §8.2). Evaluated nightly per strategy;
# promotion itself is always an explicit API/dashboard action.
min_paper_trades: 60             # OR the OOS backtest criterion below
min_oos_backtest_months: 6
min_profit_factor: 1.3           # after full Indian cost stack + slippage
max_drawdown_pct: 15.0
stop_fire_tolerance_pct: 0.5     # avg |actual fill - modeled stop| / modeled, in %
synthetic_backtest_discount: 0.5 # synthetic option-data backtests count at half weight
