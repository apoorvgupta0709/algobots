# AlgoBot deployment: `docker compose up -d` from a clean clone (+ .env with Fyers creds).
# Services: db (postgres), engine (scheduler + strategies), api (FastAPI, Hermes queue),
# dashboard (Streamlit).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: algobot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algobot}
      POSTGRES_DB: algobot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algobot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  engine:
    build: .
    command: python -m algobot.engine.scheduler
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://algobot:${POSTGRES_PASSWORD:-algobot}@db:5432/algobot
      TZ: Asia/Kolkata
    volumes:
      - marketdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn algobot.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://algobot:${POSTGRES_PASSWORD:-algobot}@db:5432/algobot
      TZ: Asia/Kolkata
    ports:
      - "8000:8000"
    volumes:
      - marketdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run algobot/dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://algobot:${POSTGRES_PASSWORD:-algobot}@db:5432/algobot
      ALGOBOT_API_URL: http://api:8000
      TZ: Asia/Kolkata
    ports:
      - "8501:8501"
    volumes:
      - marketdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  marketdata:
